[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mlops-utils"
version = "0.1.0"
description = "Shared MLOps utilities for Databricks pipelines – catalog helpers, Delta I/O, Feature Store wrappers, MLflow utils, preprocessing builders, model validation."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
dependencies = [
    "pyspark>=3.5",
    "mlflow>=3.3",
    "scikit-learn>=1.4",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "requests>=2.31",
]

[project.optional-dependencies]
databricks = [
    "databricks-feature-engineering>=0.13",
    "databricks-sdk>=0.20",
]
dev = [
    "pytest>=8.0",
    "pytest-mock>=3.12",
    "pytest-cov>=4.1",
    "ruff>=0.4",
    "mypy>=1.10",
    "types-PyYAML",
    "types-requests",
]

[tool.hatch.build.targets.wheel]
packages = ["src/mlops_utils"]

# ---------------------------------------------------------------------------
# Ruff (linting + formatting)
# ---------------------------------------------------------------------------
[tool.ruff]
src = ["src"]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4", "ANN"]
ignore = ["ANN101", "ANN102"]

# ---------------------------------------------------------------------------
# Mypy
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true
exclude = ["tests/"]

# ---------------------------------------------------------------------------
# Pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
markers = [
    "integration: marks tests that require a live Databricks cluster (deselect with '-m not integration')",
]
