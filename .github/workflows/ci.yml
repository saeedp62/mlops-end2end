name: CI / CD – Test, Build & Deploy

# ---------------------------------------------------------------------------
# Trigger matrix
#
#   pull_request  → main / develop : lint + unit tests + bundle validate
#   push          → develop         : + bundle deploy staging
#   push          → main            : + bundle deploy prod (requires approval)
#   workflow_dispatch               : manual run with target selection
# ---------------------------------------------------------------------------
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Bundle target to deploy (dev | staging | prod)"
        required: true
        default: staging
        type: choice
        options: [dev, staging, prod]
      run_integration_tests:
        description: "Run integration tests on a Databricks cluster?"
        required: false
        default: "false"
        type: boolean

env:
  PYTHON_VERSION: "3.11"
  DATABRICKS_CLI_VERSION: "0.223.2"   # Pin to a known-good DAB-compatible version

jobs:
  # ===========================================================================
  # Job 1: Lint & type-check (fast, no Spark needed)
  # ===========================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy types-PyYAML types-requests

      - name: Ruff – lint
        run: ruff check packages/mlops_utils/src/ src/ pipelines/ tests/

      - name: Ruff – format check
        run: ruff format --check packages/mlops_utils/src/ src/ pipelines/ tests/

      - name: mypy – mlops_utils
        run: mypy packages/mlops_utils/src/mlops_utils/
        continue-on-error: true   # advisory until fully annotated

      - name: mypy – churn
        run: mypy src/churn/
        continue-on-error: true

  # ===========================================================================
  # Job 2: Unit tests (local Spark, no Databricks required)
  # ===========================================================================
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Java (required for PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install mlops_utils (editable)
        run: pip install -e "packages/mlops_utils[dev]"

      - name: Install churn package (editable)
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            -m "not integration" \
            --cov=src/churn \
            --cov=packages/mlops_utils/src/mlops_utils \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unit-${{ matrix.python-version }}
        continue-on-error: true

  # ===========================================================================
  # Job 3: Build wheels + validate bundle (runs on every PR and push)
  # Produces wheel artifacts consumed by the deploy jobs below.
  # ===========================================================================
  build-and-validate:
    name: Build Wheels & Validate Bundle
    runs-on: ubuntu-latest
    needs: [unit-tests]
    outputs:
      mlops_utils_whl: ${{ steps.whl-names.outputs.mlops_utils_whl }}
      churn_whl: ${{ steps.whl-names.outputs.churn_whl }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build mlops_utils wheel
        run: |
          pip install build
          python -m build packages/mlops_utils/ --wheel

      - name: Build churn wheel
        run: python -m build . --wheel

      - name: Capture wheel filenames
        id: whl-names
        run: |
          echo "mlops_utils_whl=$(ls packages/mlops_utils/dist/*.whl | head -1)" >> $GITHUB_OUTPUT
          echo "churn_whl=$(ls dist/*.whl | head -1)" >> $GITHUB_OUTPUT

      - name: Upload wheel artifacts (shared with deploy jobs)
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ github.run_id }}
          path: |
            packages/mlops_utils/dist/*.whl
            dist/*.whl
          retention-days: 3

      # ── Bundle validation (no Databricks auth needed) ──────────────────────
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle schema (dev target – no workspace auth)
        env:
          DATABRICKS_HOST: "https://placeholder.azuredatabricks.net"
          DATABRICKS_TOKEN: "placeholder"
        run: databricks bundle validate --target dev

  # ===========================================================================
  # Job 4: Deploy to staging
  # Triggered on push to develop OR manual workflow_dispatch with target=staging
  # ===========================================================================
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [lint, build-and-validate]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'staging')
    environment: databricks-staging     # GitHub Environment with protection rules

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-wheels-${{ github.run_id }}
          path: /tmp/wheels/

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy bundle to staging
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_STAGING }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_STAGING }}
        run: |
          # Bundle deploy uploads the wheels and pipeline files, and creates/updates
          # the DLT pipelines + jobs in the staging workspace via the REST API.
          databricks bundle deploy \
            --target staging \
            --var="DATABRICKS_HOST=${{ secrets.DATABRICKS_HOST_STAGING }}" \
            --var="PIPELINE_SP_CLIENT_ID=${{ secrets.PIPELINE_SP_CLIENT_ID_STAGING }}"

      - name: Upload config YAML to staging Volume
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_STAGING }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_STAGING }}
        run: |
          databricks fs cp configs/staging.yaml \
            dbfs:/Volumes/main/dbdemos_mlops_staging/bundle/configs/staging.yaml \
            --overwrite

      - name: Summarise deployed resources
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_STAGING }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_STAGING }}
        run: databricks bundle summary --target staging

  # ===========================================================================
  # Job 5: Integration tests (staging cluster, after deploy)
  # ===========================================================================
  integration-tests:
    name: Integration Tests (Staging Cluster)
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration_tests == 'true')
    environment: databricks-staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Java (required for Databricks Connect)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-wheels-${{ github.run_id }}
          path: /tmp/wheels/

      - name: Install packages + Databricks Connect
        run: |
          pip install -e "packages/mlops_utils[dev]"
          pip install -e ".[dev]"
          pip install "databricks-connect>=14.0"

      - name: Configure Databricks Connect (routes Spark to staging cluster)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_STAGING }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_STAGING }}
          CI_CLUSTER_ID: ${{ secrets.CI_CLUSTER_ID_STAGING }}
        run: |
          databricks configure --host $DATABRICKS_HOST --token $DATABRICKS_TOKEN
          databricks-connect configure \
            --host $DATABRICKS_HOST \
            --token $DATABRICKS_TOKEN \
            --cluster-id $CI_CLUSTER_ID

      - name: Run integration tests
        env:
          MLOPS_CATALOG: main
          MLOPS_DB: dbdemos_mlops_ci
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            -m integration \
            --no-header

  # ===========================================================================
  # Job 6: Deploy to prod (requires manual approval via GitHub Environment)
  # Triggered only on push to main
  # ===========================================================================
  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [lint, build-and-validate]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'prod')
    environment: databricks-prod    # ← GitHub Environment with required reviewer approval

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-wheels-${{ github.run_id }}
          path: /tmp/wheels/

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy bundle to production
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}
        run: |
          databricks bundle deploy \
            --target prod \
            --var="DATABRICKS_HOST=${{ secrets.DATABRICKS_HOST_PROD }}" \
            --var="PIPELINE_SP_CLIENT_ID_PROD=${{ secrets.PIPELINE_SP_CLIENT_ID_PROD }}"

      - name: Upload prod config YAML to Volume
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}
        run: |
          databricks fs cp configs/prod.yaml \
            dbfs:/Volumes/main/dbdemos_mlops/bundle/configs/prod.yaml \
            --overwrite

      - name: Summarise deployed resources
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}
        run: databricks bundle summary --target prod

      - name: Tag release in Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="deploy-prod-$(date -u +%Y%m%d-%H%M%S)"
          git tag -a "$TAG" -m "Production deployment from run #${{ github.run_number }}"
          git push origin "$TAG"
