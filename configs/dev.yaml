# =============================================================================
# configs/dev.yaml
# Development / local demo environment configuration
#
# Data source: Volume CSV (file uploaded to a UC Volume for demo purposes)
# =============================================================================
catalog: main
db: dbdemos_mlops_dev

# Table names (without catalog/schema prefix)
bronze_table: advanced_churn_bronze_customers
feature_table: advanced_churn_feature_table
label_table: advanced_churn_label_table

# Model registry
model_name: advanced_mlops_churn

# Feature / label settings
label_col: churn
pos_label: "Yes"
primary_keys:
  - customer_id
  - transaction_ts
timeseries_col: transaction_ts

# Training parameters
train_ratio: 0.8
rng_seed: 2025

# MLflow experiment
experiment_path: /Users/dev_user/dbdemos_mlops
experiment_name: dbdemos_advanced_mlops_churn_dev_experiment

# ---------------------------------------------------------------------------
# Data source: Volume CSV
# Upload the IBM Telco CSV to the Volume shown below, then configure this path.
# CLI upload example:
#   databricks fs cp Telco-Customer-Churn.csv \
#     dbfs:/Volumes/main/shared_data/telco/Telco-Customer-Churn.csv
# ---------------------------------------------------------------------------
data_source:
  type: volume_csv
  volume_path: /Volumes/main/shared_data/telco/Telco-Customer-Churn.csv
  csv_options:
    header: "true"
    inferSchema: "true"
  normalize_columns: true   # snake_case column rename (IBM dataset has PascalCase)

# Online store (disabled in dev)
online_store:
  enabled: false
  backend: databricks
  endpoint_name: churn_online_features_dev
